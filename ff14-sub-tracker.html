<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 潛水艇追蹤器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; color: #ecf0f1; padding: 20px; line-height: 1.6; }
        
        .sub-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin-top: 20px; 
            justify-content: flex-start; 
        }

        .sub-card { background: #34495e; padding: 20px; border-radius: 12px; width: 280px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid #455a64; transition: transform 0.2s; }
        .sub-card:hover { transform: translateY(-5px); }
        
        @media screen and (max-width: 600px) {
            body { padding: 10px; }
            .sub-card { width: 100%; max-width: 320px; margin: 0 auto; } 
            .sub-container { flex-direction: column; align-items: center; }
        }

        .sub-title-input { background: transparent; border: none; border-bottom: 2px solid transparent; color: #f1c40f; font-size: 1.2em; font-weight: bold; width: 100%; cursor: pointer; padding-bottom: 5px; margin-bottom: 15px; text-align: center; }
        .sub-title-input:hover, .sub-title-input:focus { border-bottom: 2px solid #f1c40f; outline: none; }
        
        .input-group { margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        input[type="number"] { width: 55px; padding: 8px; border-radius: 6px; border: none; text-align: center; font-size: 1em; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 2; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:active { transform: scale(0.98); }
        .btn-reset { flex: 1; background: #95a5a6; }
        
        .btn-notify { background: #2980b9; width: auto; margin-bottom: 20px; padding: 10px 20px; }
        .countdown { font-size: 1.3em; font-weight: bold; color: #e74c3c; margin: 15px 0; text-align: center; min-height: 1.5em; }
        .return-time { font-size: 0.85em; color: #bdc3c7; text-align: center; }
    </style>
</head>
<body>

    <h1>🚢 FF14 潛水艇回航追蹤</h1>
    <button class="btn-notify" onclick="requestNotification()">🔔 啟用桌面通知</button>
    <div class="sub-container" id="subContainer"></div>

    <script>
        const subCount = 4;
        const subContainer = document.getElementById('subContainer');
        let subs = JSON.parse(localStorage.getItem('ff14_subs')) || {};

        // 初始化卡片
        for (let i = 1; i <= subCount; i++) {
            const name = subs[i]?.name || `潛艇 #${i}`;
            subContainer.innerHTML += `
                <div class="sub-card">
                    <input type="text" class="sub-title-input" id="name${i}" value="${name}" onblur="saveName(${i})" placeholder="輸入潛艇名稱">
                    <div class="input-group">
                        <input type="number" id="d${i}" placeholder="0" min="0">天
                        <input type="number" id="h${i}" placeholder="0" min="0" max="23">時
                        <input type="number" id="m${i}" placeholder="0" min="0" max="59">分
                    </div>
                    <div class="btn-group">
                        <button onclick="startTimer(${i})">開始追蹤</button>
                        <button class="btn-reset" onclick="resetTimer(${i})">重置</button>
                    </div>
                    <div class="countdown" id="count${i}">等待設定</div>
                    <div class="return-time" id="return${i}">預計回來：--</div>
                </div>
            `;
        }

        function saveName(id) {
            const newName = document.getElementById(`name${id}`).value;
            if (!subs[id]) subs[id] = {};
            subs[id].name = newName;
            localStorage.setItem('ff14_subs', JSON.stringify(subs));
        }

        function requestNotification() {
			if (!("Notification" in window)) {
				alert("這台瀏覽器不支援桌面通知。");
			} else if (Notification.permission === "granted") {
				alert("通知權限已經開啟囉！");
			} else {
				Notification.requestPermission().then(permission => {
					if (permission === "granted") {
						new Notification("通知功能啟動！", { body: "當潛艇回航時我會提醒你。" });
					} else {
						alert("通知權限被拒絕了，請檢查瀏覽器設定。");
					}
				});
			}
		} 

        function startTimer(id) {
            const d = parseInt(document.getElementById(`d${id}`).value) || 0;
            const h = parseInt(document.getElementById(`h${id}`).value) || 0;
            const m = parseInt(document.getElementById(`m${id}`).value) || 0;
            
            if (d === 0 && h === 0 && m === 0) return;

            const totalMs = ((d * 86400) + (h * 3600) + (m * 60)) * 1000;
            const targetTime = new Date().getTime() + totalMs;
            
            if (!subs[id]) subs[id] = { name: document.getElementById(`name${id}`).value };
            subs[id].target = targetTime;
            subs[id].notified = false;
            
            localStorage.setItem('ff14_subs', JSON.stringify(subs));
            
            // 清空輸入框
            document.getElementById(`d${id}`).value = "";
            document.getElementById(`h${id}`).value = "";
            document.getElementById(`m${id}`).value = "";
            
            updateUI();
        }

        function resetTimer(id) {
            if (subs[id]) {
                delete subs[id].target;
                delete subs[id].notified;
                localStorage.setItem('ff14_subs', JSON.stringify(subs));
                document.getElementById(`count${id}`).innerText = "等待設定";
                document.getElementById(`return${id}`).innerText = "預計回來：--";
            }
        }

        function updateUI() {
            const now = new Date().getTime();
            for (let i = 1; i <= subCount; i++) {
                if (subs[i]?.target) {
                    const diff = subs[i].target - now;
                    if (diff > 0) {
                        const d = Math.floor(diff / 86400000);
                        const h = Math.floor((diff % 86400000) / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        document.getElementById(`count${i}`).innerText = `${d}天 ${h}時 ${m}分 ${s}秒`;
                        document.getElementById(`return${i}`).innerText = `預計回來：${new Date(subs[i].target).toLocaleString()}`;
                    } else {
                        document.getElementById(`count${i}`).innerText = "✅ 已回航";
                        if (!subs[i].notified) {
                            if (Notification.permission === "granted") {
                                new Notification("FF14 回航通知", { body: `${subs[i].name} 已抵達港口！`, icon: "https://www.finalfantasyxiv.com/favicon.ico" });
                            }
                            subs[i].notified = true;
                            localStorage.setItem('ff14_subs', JSON.stringify(subs));
                        }
                    }
                }
            }
        }
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
