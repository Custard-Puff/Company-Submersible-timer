<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FF14 潛水艇回航追蹤器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; color: #ecf0f1; padding: 20px; line-height: 1.6; }
        .sub-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .sub-card { background: #34495e; padding: 20px; border-radius: 12px; width: 280px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid #455a64; }
        h3 { margin-top: 0; color: #f1c40f; border-bottom: 1px solid #f1c40f; padding-bottom: 10px; }
        .input-group { margin: 15px 0; }
        input { width: 45px; padding: 8px; margin: 2px; border-radius: 4px; border: none; text-align: center; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1em; transition: 0.3s; }
        button:hover { background: #2ecc71; transform: translateY(-2px); }
        .btn-notify { background: #2980b9; margin-bottom: 20px; width: auto; }
        .return-time { font-size: 0.85em; color: #bdc3c7; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px; }
        .countdown { font-size: 1.3em; font-weight: bold; color: #e74c3c; margin: 12px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        hr { border: 0; border-top: 1px solid #7f8c8d; margin: 20px 0; }
    </style>
</head>
<body>

    <h1>FF14 潛水艇回航追蹤</h1>
    <p>比照遊戲介面輸入「天 / 時 / 分」，系統將自動計算並倒數。</p>
    <button class="btn-notify" onclick="requestNotification()">🔔 啟用桌面通知</button>
    <hr>

    <div class="sub-container" id="subContainer">
        </div>

    <script>
        const subCount = 4;
        const subContainer = document.getElementById('subContainer');
        let subs = JSON.parse(localStorage.getItem('ff14_subs')) || {};

        // 初始化介面
        for (let i = 1; i <= subCount; i++) {
            subContainer.innerHTML += `
                <div class="sub-card">
                    <h3>潛艇 #${i}</h3>
                    <div class="input-group">
                        <input type="number" id="d${i}" placeholder="天" min="0" value="0"> 天
                        <input type="number" id="h${i}" placeholder="時" min="0" max="23" value="0"> 時
                        <input type="number" id="m${i}" placeholder="分" min="0" max="59" value="0"> 分
                    </div>
                    <button onclick="startTimer(${i})">開始追蹤</button>
                    <div class="countdown" id="count${i}">等待輸入...</div>
                    <div class="return-time" id="return${i}">預計回來：--</div>
                </div>
            `;
        }

        function requestNotification() {
			if (!("Notification" in window)) {
				alert("這台瀏覽器不支援桌面通知。");
			} else if (Notification.permission === "granted") {
				alert("通知權限已經開啟囉！");
			} else {
				Notification.requestPermission().then(permission => {
					if (permission === "granted") {
						new Notification("通知功能啟動！", { body: "當潛艇回航時我會提醒你。" });
					} else {
						alert("通知權限被拒絕了，請檢查瀏覽器設定。");
					}
				});
			}
		}

        function startTimer(id) {
            const d = parseInt(document.getElementById(`d${id}`).value) || 0;
            const h = parseInt(document.getElementById(`h${id}`).value) || 0;
            const m = parseInt(document.getElementById(`m${id}`).value) || 0;
            
            if (d === 0 && h === 0 && m === 0) return;

            const now = new Date();
            // 計算總毫秒數：(天*24 + 時)*3600 + 分*60
            const totalMs = ((d * 24 * 60 * 60) + (h * 60 * 60) + (m * 60)) * 1000;
            const targetTime = now.getTime() + totalMs;
            
            subs[id] = {
                target: targetTime,
                notified: false
            };
            
            localStorage.setItem('ff14_subs', JSON.stringify(subs));
            updateUI();
        }

        function updateUI() {
            const now = new Date().getTime();

            for (let i = 1; i <= subCount; i++) {
                if (subs[i]) {
                    const diff = subs[i].target - now;
                    const targetDate = new Date(subs[i].target);
                    
                    document.getElementById(`return${i}`).innerText = `預計回來：${targetDate.toLocaleString()}`;

                    if (diff > 0) {
                        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                        
                        document.getElementById(`count${i}`).innerText = `${days}天 ${hours}時 ${minutes}分 ${seconds}秒`;
                        document.getElementById(`count${i}`).style.color = "#e74c3c";
                    } else {
                        document.getElementById(`count${i}`).innerText = "✅ 已回航！";
                        document.getElementById(`count${i}`).style.color = "#2ecc71";
                        
                        if (!subs[i].notified) {
                            sendNotification(i);
                            subs[i].notified = true;
                            localStorage.setItem('ff14_subs', JSON.stringify(subs));
                        }
                    }
                }
            }
        }

        function sendNotification(id) {
            if (Notification.permission === "granted") {
                new Notification(`FF14 潛艇回報`, {
                    body: `第 ${id} 艘潛水艇已經回到岸邊囉！`,
                    icon: "https://www.finalfantasyxiv.com/favicon.ico"
                });
            }
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
